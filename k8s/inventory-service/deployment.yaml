apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: ecommerce
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: jjnovoap/inventory-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          env:
          - name: DATABASE_URL
            valueFrom:
              configMapKeyRef:
                name: ecommerce-config
                key: DATABASE_URL
          - name: INVENTORY_SERVICE_URL
            valueFrom:
              configMapKeyRef:
                name: ecommerce-config
                key: INVENTORY_SERVICE_URL

          livenessProbe:
            httpGet:
              path: /inventory/health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /inventory/health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5