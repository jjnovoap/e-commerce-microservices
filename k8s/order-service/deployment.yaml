apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
      
  template:
    metadata:
      labels:
        app: order-service

    spec:
      containers:
        - name: order-service
          image: jjnovoap/order-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002

          envFrom:
            - configMapRef:
                name: ecommerce-config
            - secretRef:
                name: app-secret

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /orders/health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /orders/health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3