apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: ecommerce
spec:
  replicas: 2
  selector: 
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec: 
      containers:
      - name: product-service
        image: product-service:1.0
        imagePullPolicy: IfNotPresent
        ports: 
          - containerPort: 8000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        env:
          - name: INVENTORY_SERVICE_URL
            valueFrom:
              configMapKeyRef:
                name: ecommerce-config
                key: INVENTORY_SERVICE_URL
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe: 
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds:  5
          periodSeconds: 5