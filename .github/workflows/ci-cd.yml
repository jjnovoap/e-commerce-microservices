name: CI/CD 

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r services/product-service/requirements.txt
        pip install -r services/inventory-service/requirements.txt

    - name: Run tests
      run: |
        pip install pytest
        pytest services/
        
  docker-build:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Product Service
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/product-service:latest services/product-service/
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/product-service:latest

    - name: Build and push Inventory Service
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/inventory-service:latest services/inventory-service/
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/inventory-service:latest